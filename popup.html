<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 400px; background-color: #0d0d0d; color: #00ff00; font-family: monospace; padding: 10px; }
        button { width: 100%; padding: 10px; background: #222; color: #00ff00; border: 1px solid #00ff00; cursor: pointer; margin-bottom: 5px; font-weight: bold; }
        button:hover { background: #00ff00; color: #000; }
        textarea { width: 100%; height: 250px; background: #111; color: #fff; border: 1px solid #333; margin-top: 10px; font-family: monospace; resize: vertical; }
    </style>

<body>
    <button id="scanBtn">Scan & Format Notes</button>
    <textarea id="output" placeholder="Awaiting operational data..."></textarea>
    <button id="copyBtn" style="margin-top: 10px;">Copy to Obsidian</button>
    <script src="popup.js"></script>
</body>
</html>
